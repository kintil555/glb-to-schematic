name: Build GLB-to-Schematic Converter (Windows)

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (Windows / Python 3.11)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip
        shell: pwsh
        run: python -m pip install --upgrade pip

      - name: Run tests (no external deps needed)
        shell: pwsh
        run: python tests\run_tests.py

  # ── 2. Build Windows EXE ──────────────────────────────────────────────────
  build:
    name: Build Windows EXE
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow

      - name: Build EXE
        shell: pwsh
        run: pyinstaller --onefile --windowed --name glb-to-schematic --distpath dist src\gui.py

      - name: Smoke test EXE
        shell: pwsh
        run: Test-Path dist\glb-to-schematic.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glb-to-schematic-windows
          path: dist\glb-to-schematic.exe
          retention-days: 30

  # ── 3. Release on Tag ─────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: glb-to-schematic-windows
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GLB to Schematic ${{ github.ref_name }}"
          body: |
            ## GLB/GLTF to Schematic Converter ${{ github.ref_name }}

            Convert 3D model GLB/GLTF ke format `.schematic` untuk Mine-imator.

            ### Cara pakai
            ```
            glb-to-schematic.exe model.glb output.schematic
            glb-to-schematic.exe model.glb output.schematic --resolution 128 --block wool
            glb-to-schematic.exe model.gltf output.schematic --no-fill --scale 2.0
            ```

            ### Options
            ```
            --resolution  -r   Ukuran voxel grid (default: 64)
            --block       -b   Jenis block: stone, wool, glass, brick (default: stone)
            --fill             Isi interior (default)
            --no-fill          Hanya surface / hollow
            --scale       -s   Skala model (default: 1.0)
            ```
          draft: false
          prerelease: false
          files: release-assets/glb-to-schematic.exe
